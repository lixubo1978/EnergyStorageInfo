<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF查看</title>

    <style>
        body {
            text-align: center;           /* 整体居中 */
            font-family: Arial, sans-serif;
            margin-top: 100px;            /* 往下挪一点更舒服 */
        }

        h2 {
            margin-bottom: 30px;
        }

        button {
            font-size: 18px;              /* 字变大 */
            padding: 12px 25px;           /* 按钮变大 */
            margin: 10px;                 /* 按钮之间间距 */
            border-radius: 8px;           /* 圆角 */
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;    /* 鼠标悬停效果 */
        }
    </style>

</head>
<body>

<h2>请选择文件：</h2>

<button onclick="openPDF('assets/24063_Primer_390kW+100kWakku_CSD_20250502.pdf')">
    打开文件 1
</button>

<button onclick="openPDF('assets/Pr1mer_KONC_20260217_jav.pdf')">
    打开文件 2
</button>

<script>
function openPDF(file) {
    window.open(file, '_blank');
}
</script>

</body>
</html>
