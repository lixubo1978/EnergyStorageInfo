<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF查看</title>
</head>
<body>

<h2>请选择文件：</h2>

<button onclick="showPDF('file1.pdf')">文件一</button>
<button onclick="showPDF('file2.pdf')">文件二</button>

<br><br>

<iframe id="viewer" width="100%" height="600px"></iframe>

<script>
function showPDF(file) {
    document.getElementById('viewer').src = file;
}
</script>

</body>
</html>
